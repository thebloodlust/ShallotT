<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    :root {
      --bg-color: #181c24;
      --card-bg: #1f2430;
      --text-color: #c9ceef;
      --text-muted: #707a8a;
      --accent-color: #ffaa33;
      --accent-hover: #ffbb55;
      --border-color: #2e3440;
      --input-bg: #13171f;
    }
    
    body {
      width: 400px;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      margin: 0;
      padding: 12px;
      box-sizing: border-box;
      overflow: hidden;
    }
    
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 8px;
    }
    
    h1 {
      font-size: 16px;
      margin: 0;
      color: var(--accent-color);
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    
    .logo-img {
      width: 22px;
      height: 22px;
      background-image: url('../icons/icon32.png');
      background-size: contain;
      background-repeat: no-repeat;
      border-radius: 4px;
    }
    
    .settings-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 14px;
      padding: 4px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .settings-btn:hover {
      color: var(--text-color);
      background-color: rgba(255, 255, 255, 0.05);
    }
    
    .lang-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }
    
    select {
      flex: 1;
      background-color: var(--input-bg);
      color: var(--text-color);
      border: 1px solid var(--border-color);
      border-radius: 4px;
      padding: 6px;
      font-size: 12px;
      outline: none;
      cursor: pointer;
    }
    
    select:focus {
      border-color: var(--accent-color);
    }
    
    .swap-btn {
      background-color: var(--card-bg);
      border: 1px solid var(--border-color);
      color: var(--text-color);
      border-radius: 4px;
      width: 28px;
      height: 28px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .swap-btn:hover {
      border-color: var(--accent-color);
    }
    
    .text-areas {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    
    .area-container {
      position: relative;
    }
    
    textarea {
      width: 100%;
      height: 90px;
      background-color: var(--input-bg);
      color: var(--text-color);
      border: 1px solid var(--border-color);
      border-radius: 6px;
      padding: 8px;
      box-sizing: border-box;
      resize: none;
      font-size: 12px;
      line-height: 1.5;
      font-family: inherit;
    }
    
    textarea:focus {
      outline: none;
      border-color: var(--accent-color);
    }
    
    textarea[readonly] {
      background-color: var(--card-bg);
    }
    
    .area-label {
      font-size: 10px;
      color: var(--text-muted);
      margin-bottom: 4px;
      font-weight: 500;
    }
    
    .actions-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 10px;
    }
    
    .char-count {
      font-size: 10px;
      color: var(--text-muted);
    }
    
    .action-buttons {
      display: flex;
      gap: 6px;
    }
    
    button.primary {
      background-color: var(--accent-color);
      color: #000;
      border: none;
      border-radius: 4px;
      padding: 6px 12px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
    }
    
    button.primary:hover {
      background-color: var(--accent-hover);
    }
    
    button.secondary {
      background-color: var(--card-bg);
      color: var(--text-color);
      border: 1px solid var(--border-color);
      border-radius: 4px;
      padding: 6px 12px;
      font-size: 12px;
      cursor: pointer;
    }
    
    button.secondary:hover {
      border-color: var(--accent-color);
    }
    
    /* Config Panel */
    #settingsPanel {
      display: none;
      background-color: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 6px;
      padding: 10px;
      margin-top: 10px;
      font-size: 11px;
    }
    
    .form-group {
      margin-bottom: 8px;
    }
    
    .form-group label {
      display: block;
      margin-bottom: 4px;
      color: var(--text-muted);
    }
    
    .form-group input {
      width: 100%;
      background-color: var(--input-bg);
      color: var(--text-color);
      border: 1px solid var(--border-color);
      border-radius: 4px;
      padding: 5px;
      box-sizing: border-box;
      font-size: 11px;
    }
    
    .form-group input:focus {
      outline: none;
      border-color: var(--accent-color);
    }
    
    .status-msg {
      font-size: 10px;
      margin-top: 8px;
      color: var(--text-muted);
    }
    
    .status-msg.error {
      color: #f38ba8;
    }
    
    .status-msg.success {
      color: #a6e3a1;
    }
  </style>
</head>
<body>
  <header>
    <h1><div class="logo-img"></div> ShallotT Local</h1>
    <button class="settings-btn" id="toggleSettings" title="Configuration">⚙️ Options</button>
  </header>

  <!-- Connection parameters -->
  <div id="settingsPanel">
    <div class="form-group">
      <label for="ollamaUrl">URL d'Ollama :</label>
      <input type="text" id="ollamaUrl" value="http://localhost:11434">
    </div>
    <div class="form-group">
      <label for="ollamaModel">Modèle Ollama :</label>
      <select id="ollamaModel" style="width: 100%; cursor: pointer;"></select>
    </div>
    <div class="form-group">
      <label for="ollamaApiKey">Clé API / Token (Optionnel) :</label>
      <input type="password" id="ollamaApiKey" value="" placeholder="Token de sécurité">
    </div>
    <div style="display: flex; gap: 6px; margin-top: 10px;">
      <button class="secondary" id="saveSettings" style="flex: 1; padding: 4px;">Sauvegarder</button>
      <button class="secondary" id="testSettings" style="flex: 1; padding: 4px;">Tester Ollama</button>
    </div>
    <div id="testStatus" class="status-msg"></div>
  </div>

  <div class="lang-row">
    <select id="srcLang">
      <option value="Auto Detection">Auto-Détection</option>
      <option value="French">Français</option>
      <option value="English">Anglais</option>
      <option value="Spanish">Espagnol</option>
      <option value="German">Allemand</option>
      <option value="Italian">Italien</option>
      <option value="Portuguese">Portugais</option>
      <option value="Chinese">Chinois</option>
      <option value="Japanese">Japonais</option>
      <option value="Russian">Russe</option>
    </select>
    <button class="swap-btn" id="swapBtn" title="Inverser les langues">⇄</button>
    <select id="targetLang">
      <option value="French">Français</option>
      <option value="English" selected>Anglais</option>
      <option value="Spanish">Espagnol</option>
      <option value="German">Allemand</option>
      <option value="Italian">Italien</option>
      <option value="Portuguese">Portugais</option>
      <option value="Chinese">Chinois</option>
      <option value="Japanese">Japonais</option>
      <option value="Russian">Russe</option>
    </select>
  </div>

  <div class="text-areas">
    <div class="area-container">
      <div class="area-label">TEXTE À TRADUIRE</div>
      <textarea id="srcText" placeholder="Saisissez ou collez du texte... (Raccourci Alt+Shift+T sur une page pour traduire direct)"></textarea>
    </div>
    
    <div class="area-container">
      <div class="area-label">TRADUCTION GEMMA</div>
      <textarea id="targetText" readonly placeholder="La traduction s'affichera ici..."></textarea>
    </div>
  </div>

  <div class="actions-row">
    <div class="char-count" id="charCount">0 caractères</div>
    <div class="action-buttons">
      <button class="secondary" id="copyBtn">Copier</button>
      <button class="primary" id="translateBtn">Traduire</button>
    </div>
  </div>
  
  <div id="globalStatus" class="status-msg"></div>

  <script src="popup.js"></script>
</body>
</html>
