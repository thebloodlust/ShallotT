<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShallotT</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 300px;
      min-height: 200px;
      background: #1e1e2e;
      color: #cdd6f4;
      font-family: system-ui, sans-serif;
      font-size: 14px;
      padding: 16px;
    }
    h1 {
      color: #89b4fa;
      font-size: 16px;
      margin-bottom: 12px;
    }
    textarea {
      width: 100%;
      height: 80px;
      resize: vertical;
      background: #313244;
      color: #cdd6f4;
      border: 1px solid #45475a;
      border-radius: 6px;
      padding: 8px;
      font-size: 13px;
      font-family: inherit;
    }
    textarea:focus { outline: 2px solid #89b4fa; }
    button {
      margin-top: 10px;
      width: 100%;
      padding: 8px;
      background: #89b4fa;
      color: #1e1e2e;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
    }
    button:hover { background: #b4d0f7; }
    button:disabled { background: #45475a; color: #6c7086; cursor: not-allowed; }
    #result {
      margin-top: 12px;
      padding: 10px;
      background: #313244;
      border-radius: 6px;
      word-break: break-word;
      min-height: 40px;
      white-space: pre-wrap;
    }
    #result.error { color: #f38ba8; }
    .settings-link {
      display: block;
      margin-top: 12px;
      text-align: right;
      color: #6c7086;
      font-size: 12px;
      cursor: pointer;
      text-decoration: underline;
    }
    .settings-link:hover { color: #89b4fa; }
  </style>
</head>
<body>
  <h1>🧅 ShallotT</h1>
  <textarea id="input" placeholder="Paste text to translate…"></textarea>
  <button id="btn">Translate</button>
  <div id="result">Translation will appear here.</div>
  <a class="settings-link" id="settings-link">⚙ Settings</a>
  <script src="popup.js"></script>
</body>
</html>
